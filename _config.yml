about_content: |
  Hello! I'm Nikoo Moradi, a first-year PhD student in the UKRI AI Centre for Biomedical Innovation (AI4BI CDT) at the University of Edinburgh.

  My research focuses on developing <mark>AI-driven EEG biomarkers</mark> for <mark>neurodevelopmental disorders</mark>, with a current focus on <mark>SYNGAP1-related disorder</mark>. I work at the intersection of machine learning, EEG signal processing, neuroscience, and healthcare AI.

  I am interested in building interpretable and clinically useful AI systems that can identify meaningful patterns in neural recordings, support biomarker discovery, and help measure disease severity and treatment response.

  My broader research interests include <mark>NeuroAI</mark>, <mark>EEG biomarkers</mark>, <mark>explainable AI</mark>, <mark>medical image analysis</mark>, and <mark>AI for healthcare</mark>.

content:
  - title: Current Research
    layout: text
    content: |
      My PhD project is titled **Artificial Intelligence EEG Biomarkers for Neurodevelopmental Disorders**.

      I am developing machine-learning pipelines to analyse EEG recordings from animal models and human cohorts of SYNGAP1-related disorder. The goal is to discover objective EEG-based biomarkers that can distinguish affected individuals from controls, track disease severity, and measure treatment response.

      My current work includes EEG preprocessing, artifact and seizure removal, feature engineering, subject-level cross-validation, BorutaSHAP feature selection, Hyperopt hyperparameter tuning, and tree-based models such as XGBoost and CatBoost.

      I am especially interested in interpretable AI methods that can reveal biologically meaningful EEG signatures, such as spectral, connectivity, and complexity-based features.

  - title: Research Highlights
    layout: text
    content: |
      - Developing AI-based EEG biomarkers for SYNGAP1-related disorder.
      - Working with rodent and human EEG datasets, including sleep-staged recordings.
      - Achieved strong preliminary animal-level classification performance using EEG features and XGBoost.
      - Investigating alpha-delta ratio and cross-channel connectivity as candidate EEG biomarkers.
      - Extending the work toward severity prediction, treatment-response modelling, deep learning, and explainable AI.
      - First-place team in Task 1 of the HNTS-MRG24 MICCAI Challenge.

